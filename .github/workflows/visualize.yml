name: Visualize BayGMST Results

# BayGMST is 1D (global mean), not a spatial field like LMR2 / Holocene DA,
# so we skip the presto-viz reusable workflow (it's designed for gridded
# NetCDF) and publish the R-generated PNGs straight to GitHub Pages with
# the same tile UI as the other PReSto templates.

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["BayGMST Reconstruction"]
    types: [completed]

jobs:
  find-latest-run:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    outputs:
      run_number: ${{ steps.get_run.outputs.run_number }}
      run_id:     ${{ steps.get_run.outputs.run_id }}
      artifact_name: ${{ steps.get_run.outputs.artifact_name }}
    steps:
      - name: Find reconstruction run and artifact
        id: get_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            run_id="${{ github.event.workflow_run.id }}"
            run_number="${{ github.event.workflow_run.run_number }}"
          else
            latest_run=$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${{ github.repository }}/actions/workflows/baygmst.yml/runs?status=success&per_page=1" \
              --jq '.workflow_runs[0]')
            run_id=$(echo "$latest_run" | jq -r '.id')
            run_number=$(echo "$latest_run" | jq -r '.run_number')
          fi
          if [ "$run_id" = "null" ] || [ -z "$run_id" ]; then
            echo "Error: No successful BayGMST runs found"
            exit 1
          fi
          echo "run_id=$run_id" >> $GITHUB_OUTPUT
          echo "run_number=$run_number" >> $GITHUB_OUTPUT
          echo "artifact_name=baygmst-reconstruction-${run_id}" >> $GITHUB_OUTPUT

  download-artifact:
    needs: find-latest-run
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download reconstruction artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.find-latest-run.outputs.artifact_name }}
          path: ./recon-data
          run-id: ${{ needs.find-latest-run.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: List downloaded contents
        run: ls -lhR ./recon-data/

      - name: Re-upload for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: recon-data-for-viz-${{ github.run_number }}
          path: ./recon-data/
          retention-days: 7

  deploy-to-github-pages:
    needs: [find-latest-run, download-artifact]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download recon data
        uses: actions/download-artifact@v4
        with:
          name: recon-data-for-viz-${{ github.run_number }}
          path: ./viz

      - name: Prepare Pages content
        run: |
          # Mirror the tile UI used by the other PReSto templates. For
          # BayGMST we surface the PNG figures BayGMST_v1.0.R already
          # generates (reconstruction_ts, posterior histograms, residual
          # ACF/PACF), plus the CSV + NetCDF for downloads.
          mkdir -p ./pages/figures ./pages/data ./pages/images
          cp -r ./viz/figures/. ./pages/figures/ 2>/dev/null || true
          cp -r ./viz/reconstructions/. ./pages/data/ 2>/dev/null || true
          cp images/*.png ./pages/images/ 2>/dev/null || true

          # Index page: tile layout matching holocene_da's pattern.
          cat > ./pages/index.html <<'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>BayGMST Reconstruction — PReSto</title>
            <style>
              :root {
                --bg: #f7f8fa; --fg: #1a1a1a; --accent: #2563eb;
                --tile-bg: #ffffff;
                --tile-shadow: 0 2px 8px rgba(0,0,0,0.08);
                --tile-shadow-hover: 0 6px 18px rgba(0,0,0,0.14);
              }
              * { box-sizing: border-box; }
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                     background: var(--bg); color: var(--fg); margin: 0; min-height: 100vh;
                     display: flex; flex-direction: column; }
              header { text-align: center; padding: 48px 24px 24px; }
              header h1 { margin: 0; font-size: 2rem; font-weight: 600; }
              main { flex: 1; display: flex; justify-content: center; align-items: center;
                     padding: 24px; }
              .tiles { display: flex; flex-wrap: wrap; gap: 32px; justify-content: center; }
              .tile { display: flex; flex-direction: column; align-items: center;
                      width: clamp(240px, 32vw, 480px);
                      padding: clamp(20px, 2.5vw, 40px);
                      background: var(--tile-bg); border-radius: 12px;
                      box-shadow: var(--tile-shadow);
                      text-decoration: none; color: var(--fg);
                      transition: transform 0.15s ease, box-shadow 0.15s ease; }
              .tile:hover { transform: translateY(-3px); box-shadow: var(--tile-shadow-hover); }
              .tile img { width: 100%; height: clamp(160px, 22vw, 360px); object-fit: contain; margin-bottom: 20px; }
              .tile span { font-size: clamp(1.1rem, 1.6vw, 1.5rem); font-weight: 500; color: var(--accent); text-align: center; }
              footer { text-align: center; padding: 32px 24px 40px; }
            </style>
          </head>
          <body>
            <header>
              <h1>BayGMST Reconstruction — PReSto Custom</h1>
              <p>Bayesian Global Mean Surface Temperature reconstruction (Bagwell et al. 2025)</p>
            </header>
            <main>
              <div class="tiles">
                <a class="tile" href="figures/reconstruction_ts.png">
                  <img src="figures/reconstruction_ts.png" alt="Reconstruction time series">
                  <span>Reconstruction Time Series</span>
                </a>
                <a class="tile" href="data/gmst_reconstruction_data.csv">
                  <img src="images/visualization.png" alt="Download data" onerror="this.style.display='none'">
                  <span>Download CSV / NetCDF</span>
                </a>
              </div>
            </main>
            <footer>
              <small>Generated by <a href="https://paleopresto.com">PReSto</a></small>
            </footer>
          </body>
          </html>
          HTMLEOF

          # If the R script didn't manage to write reconstruction_ts.png
          # (e.g. ggplot2 patchwork failure), fall back to the first PNG it did
          # produce so the tile still renders.
          if [ ! -f ./pages/figures/reconstruction_ts.png ]; then
            FIRST_PNG=$(ls ./pages/figures/*.png 2>/dev/null | head -n 1)
            if [ -n "$FIRST_PNG" ]; then
              cp "$FIRST_PNG" ./pages/figures/reconstruction_ts.png
            fi
          fi

          echo "Pages content:"
          ls -lhR ./pages/

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages on first deploy. If this fails with "Resource
          # not accessible by integration", the repo owner must enable Pages
          # manually one time: Settings -> Pages -> Source = "GitHub Actions".
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Homepage URL is set by the PReSto webhook handler using the user's
      # OAuth token (GITHUB_TOKEN lacks admin permission to update repo settings).

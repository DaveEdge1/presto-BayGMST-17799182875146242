name: BayGMST Reconstruction

on:
  push:
    paths:
      - 'query_params.json'   # server commits this LAST so all files are present
  workflow_dispatch:
    inputs:
      unique_id:
        description: 'Unique reconstruction ID'
        required: false
        type: string
      lipd_query_json:
        description: 'LiPD data query parameters (dispatch pathway)'
        required: false
        type: string

jobs:
  # ── Job 1: Acquire proxy data ─────────────────────────────────────────────
  # Skipped when user_config.yml has ptype: ALL_cached_Barboza (cached RPs).
  # Otherwise queries LiPDverse via the lipdGenerator container and uploads
  # lipd_legacy.pkl as an artifact for the reconstruct job.
  prepare-data:
    runs-on: ubuntu-latest
    timeout-minutes: 200
    permissions:
      contents: write   # for committing CITATION.cff updates back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read ptype from user_config.yml
        id: ptype
        run: |
          PTYPE=$(python3 -c "import yaml; print(yaml.safe_load(open('config/user_config.yml'))['ptype'])")
          echo "ptype=$PTYPE" >> $GITHUB_OUTPUT
          if [ "$PTYPE" = "ALL_cached_Barboza" ]; then
            echo "use_lipd=false" >> $GITHUB_OUTPUT
            echo "Cached Barboza RPs in use — skipping LiPD fetch."
          else
            echo "use_lipd=true" >> $GITHUB_OUTPUT
            echo "ptype=$PTYPE — will fetch LiPD data."
          fi

      - name: Detect data acquisition pathway
        if: steps.ptype.outputs.use_lipd == 'true'
        id: pathway
        run: |
          if [ -f "query_params.json" ]; then
            echo "pathway=github_actions" >> $GITHUB_OUTPUT
            MODE=$(jq -r '.mode' query_params.json)
            echo "mode=$MODE" >> $GITHUB_OUTPUT
            echo "Using query_params.json from repo (mode: $MODE)"
          elif [ -n "${{ inputs.lipd_query_json }}" ]; then
            echo "pathway=github_actions" >> $GITHUB_OUTPUT
            echo '${{ inputs.lipd_query_json }}' > query_params.json
            MODE=$(jq -r '.mode' query_params.json)
            echo "mode=$MODE" >> $GITHUB_OUTPUT
            echo "Using lipd_query_json input (mode: $MODE)"
          else
            echo "ERROR: ptype != ALL_cached_Barboza but no LiPD query found."
            exit 1
          fi

      # PATH A: archived compilation (direct pickle download from LiPDverse).
      - name: Download archived compilation
        if: steps.ptype.outputs.use_lipd == 'true' && steps.pathway.outputs.mode == 'archived'
        run: |
          COMPILATION=$(jq -r '.compilation' query_params.json)
          VERSION=$(jq -r '.version' query_params.json)
          PICKLE_URL="https://lipdverse.org/${COMPILATION}/${VERSION}/${COMPILATION}${VERSION}.pkl"
          echo "Downloading archived compilation from: $PICKLE_URL"
          curl -L -f "$PICKLE_URL" -o lipd_legacy.pkl
          ls -lh lipd_legacy.pkl

      # PATH B: filtered query via lipdGenerator container.
      - name: Generate LiPD data from query
        if: steps.ptype.outputs.use_lipd == 'true' && steps.pathway.outputs.mode == 'filtered'
        run: |
          echo "Querying lipdverse via lipdGenerator..."
          mkdir -p lipd_output
          docker run --rm \
            -v $(pwd)/query_params.json:/query_params.json:ro \
            -v $(pwd)/lipd_output:/output \
            davidedge/lipd_webapps:lipdGenerator /query_params.json /output pickle

          if [ ! -f lipd_output/lipd_legacy.pkl ]; then
            echo "ERROR: lipdGenerator did not produce lipd_legacy.pkl"
            ls -la lipd_output/ || true
            exit 1
          fi
          mv lipd_output/lipd_legacy.pkl lipd_legacy.pkl
          ls -lh lipd_legacy.pkl

      - name: Generate citation files
        if: steps.ptype.outputs.use_lipd == 'true'
        run: |
          RECON_ID="${{ inputs.unique_id }}"
          [ -z "$RECON_ID" ] && RECON_ID=$(jq -r '.uniqueID // empty' query_params.json 2>/dev/null || echo "")
          [ -z "$RECON_ID" ] && RECON_ID="${{ github.run_id }}"
          mkdir -p citations_out

          MERGE_FLAG=""
          EXTRA_MOUNT=""
          if [ -f CITATION.cff ]; then
            EXTRA_MOUNT="-v $(pwd)/CITATION.cff:/existing_cff/CITATION.cff:ro"
            MERGE_FLAG="--merge-cff=/existing_cff/CITATION.cff"
            echo "Existing CITATION.cff detected — will merge addendum"
          fi

          docker run --rm \
            -v "$(pwd)/lipd_legacy.pkl:/data/lipd_legacy.pkl:ro" \
            -v "$(pwd)/citations_out:/citations_out" \
            $EXTRA_MOUNT \
            davidedge/lipd_webapps:lipdGenerator \
            citations /data/lipd_legacy.pkl /citations_out \
            --title="BayGMST Reconstruction $RECON_ID" \
            --url="https://github.com/${{ github.repository }}" \
            --unique-id="$RECON_ID" \
            --author="${{ github.repository_owner }}" \
            $MERGE_FLAG
          ls -lh citations_out/ 2>/dev/null || true

      - name: Commit citation files
        if: steps.ptype.outputs.use_lipd == 'true'
        run: |
          if [ ! -f citations_out/data_references.bib ] && [ ! -f citations_out/CITATION.cff ]; then
            echo "No citation files generated; nothing to commit"
            exit 0
          fi
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          [ -f citations_out/data_references.bib ] && cp citations_out/data_references.bib data_references.bib && git add data_references.bib
          [ -f citations_out/CITATION.cff ]        && cp citations_out/CITATION.cff        CITATION.cff        && git add CITATION.cff
          if git diff --staged --quiet; then
            echo "No citation file changes to commit"
          else
            git commit -m "Add data citations for BayGMST reconstruction ${{ github.run_id }}"
            # Race-tolerant push (reconstruct job may push results in parallel)
            for i in 1 2 3; do
              git pull --rebase origin "${{ github.ref_name }}" && git push && break || sleep $((i*5))
            done
          fi

      - name: Upload proxy data artifact
        if: steps.ptype.outputs.use_lipd == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: baygmst-proxy-data-${{ github.run_id }}
          path: lipd_legacy.pkl
          retention-days: 7

  # ── Job 2: Run BayGMST reconstruction ─────────────────────────────────────
  # Builds the R/Stan container, runs the full pipeline (adapter → reducer →
  # Stan fit → NetCDF), commits results back to the repo, and uploads a
  # 90-day artifact.
  reconstruct:
    needs: prepare-data
    if: always() && (needs.prepare-data.result == 'success' || needs.prepare-data.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read ptype from user_config.yml
        id: ptype
        run: |
          PTYPE=$(python3 -c "import yaml; print(yaml.safe_load(open('config/user_config.yml'))['ptype'])")
          echo "ptype=$PTYPE" >> $GITHUB_OUTPUT
          if [ "$PTYPE" = "ALL_cached_Barboza" ]; then
            echo "use_lipd=false" >> $GITHUB_OUTPUT
          else
            echo "use_lipd=true" >> $GITHUB_OUTPUT
          fi

      - name: Download proxy data artifact
        if: steps.ptype.outputs.use_lipd == 'true'
        uses: actions/download-artifact@v4
        with:
          name: baygmst-proxy-data-${{ github.run_id }}

      - name: Build BayGMST container
        # Caches the R + cmdstan layer on the runner; only the COPY of
        # source code (last layer) rebuilds when scripts change.
        run: docker build -t baygmst:local .

      - name: Run BayGMST pipeline
        run: |
          mkdir -p ./results
          PROXY_MOUNT=""
          if [ -f lipd_legacy.pkl ]; then
            PROXY_MOUNT="-v $(pwd)/lipd_legacy.pkl:/proxies/lipd_legacy.pkl:ro"
          fi
          echo "Config in use:"
          cat config/user_config.yml
          echo "---"
          docker run --rm \
            $PROXY_MOUNT \
            -v $(pwd)/config/user_config.yml:/app/config/user_config.yml:ro \
            -v $(pwd)/results:/results \
            baygmst:local

      - name: Verify reconstruction results
        run: |
          if [ ! -f ./results/reconstructions/gmst_reconstruction_data.csv ]; then
            echo "ERROR: gmst_reconstruction_data.csv not produced"
            ls -lR ./results/ || true
            exit 1
          fi
          echo "Reconstruction completed successfully"
          ls -lhR ./results/

      - name: Generate configs.yml for visualization
        run: |
          python3 -c "
          import yaml
          with open('config/user_config.yml') as f:
              flat = yaml.safe_load(f)
          def flatten(d, prefix=''):
              for k, v in d.items():
                  key = f'{prefix}{k}' if not prefix else f'{prefix}.{k}'
                  if isinstance(v, dict):
                      yield from flatten(v, key)
                  else:
                      yield key, v
          nested = {'presto_config': {k: {'value': str(v)} for k, v in flatten(flat)}}
          with open('results/configs.yml', 'w') as f:
              yaml.dump(nested, f, default_flow_style=False)
          "
          cat results/configs.yml

      - name: Upload reconstruction artifact
        uses: actions/upload-artifact@v4
        with:
          name: baygmst-reconstruction-${{ github.run_id }}
          path: ./results/
          retention-days: 90

      - name: Commit small results to repo
        continue-on-error: true
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          # Only commit files under 100MB. NetCDFs from BayGMST are tiny
          # (1D timeseries), so this should always include the .nc.
          # -f because results/ is in .gitignore (local dev dir); CI is
          # the only place that publishes its contents.
          find results/ -type f -size -100M | while read f; do git add -f "$f"; done
          if git diff --staged --quiet; then
            echo "No files under 100MB to commit"
          else
            git commit -m "Add BayGMST reconstruction results for ${{ github.run_id }}"
            for i in 1 2 3; do
              git pull --rebase origin "${{ github.ref_name }}" && git push && break || sleep $((i*5))
            done
          fi
